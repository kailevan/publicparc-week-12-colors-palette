<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>COLORS — Palette</title>
  <link rel="stylesheet" href="css/styles.css?v=12" />
</head>
<body>
  <div class="phone">
    <!-- top chrome -->
    <header class="topbar">
      <img class="logo" src="assets/logo.webp" alt="COLORS" />
      <span class="count" id="count"></span>
    </header>

    <!-- the grid -->
    <main class="stage" id="stage">
      <div class="grid" id="grid"></div>
    </main>

    <!-- liquid-glass filter island — ONE morphing glass button -->
    <!-- closed: "Filter"  <->  open: Filter | Color | Fabric | Type
         <->  selected: <category> + its embedded selector -->
    <div class="island" id="island">
      <div class="lg-glass" id="lgGlass">
        <span class="divider"></span>
        <span class="divider"></span>
        <span class="divider"></span>
        <button class="lab lab-main" id="labFilter">Filter</button>
        <button class="lab lab-opt" id="labColor"  data-sort="color"><span class="t t-reg">Color</span><span class="t t-bold">Color</span></button>
        <button class="lab lab-opt" id="labFabric" data-sort="fabric"><span class="t t-reg">Fabric</span><span class="t t-bold">Fabric</span></button>
        <button class="lab lab-opt" id="labType"   data-sort="type"><span class="t t-reg">Type</span><span class="t t-bold">Type</span></button>
        <div class="sel-spectrum" id="selSpectrum">
          <div class="sel-track" id="selTrack"></div>
          <div class="sel-handle" id="selHandle"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=12"></script>
</body>
</html>
