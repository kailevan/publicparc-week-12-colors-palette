<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>COLORS — Palette (canvas)</title>
  <link rel="stylesheet" href="css/styles.css?v=34" />
  <style>
    /* canvas replaces the DOM grid; one viewport-sized layer -> no texture limits */
    .stage { position: relative; }
    #cv { display: block; width: 100%; height: 100%; touch-action: none; }
    /* tiny build tag so it's obvious which prototype you're on */
    .build { position: absolute; left: 8px; bottom: 6px; z-index: 40; font: 10px/1 "Cosmos Oracle", sans-serif;
             letter-spacing: .04em; text-transform: uppercase; color: rgba(0,0,0,.28); pointer-events: none; }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <img class="logo" src="assets/logo.webp" alt="COLORS" />
      <nav class="topnav">
        <span class="navlink">Account</span>
        <span class="navlink">Bag</span>
      </nav>
    </header>

    <main class="stage" id="stage">
      <canvas id="cv"></canvas>
      <span class="build">canvas build</span>
    </main>

    <div class="island" id="island">
      <div class="lg-glass" id="lgGlass">
        <span class="divider"></span><span class="divider"></span><span class="divider"></span>
        <button class="lab lab-main" id="labFilter"><span class="t t-reg">Filter</span><span class="t t-bold">Filter</span></button>
        <button class="lab lab-opt" id="labColor"  data-sort="color"><span class="t t-reg">Color</span><span class="t t-bold">Color</span></button>
        <button class="lab lab-opt" id="labFabric" data-sort="fabric"><span class="t t-reg">Fabric</span><span class="t t-bold">Fabric</span></button>
        <button class="lab lab-opt" id="labType"   data-sort="type"><span class="t t-reg">Type</span><span class="t t-bold">Type</span></button>
        <div class="sel-spectrum" id="selSpectrum">
          <div class="sel-track" id="selTrack"></div>
          <div class="sel-handle" id="selHandle"></div>
        </div>
        <button class="sel-swatch" id="selSwatch" aria-label="Pick colour"></button>
        <button class="pm-icon" id="pmIcon" aria-label="Toggle"><span class="pm-bar pm-h"></span><span class="pm-bar pm-v"></span></button>
      </div>
    </div>
  </div>

  <script src="js/canvas.js?v=4"></script>
</body>
</html>
